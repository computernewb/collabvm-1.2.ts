name: "Check formatting"
on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
jobs:
  run_format:
    name: "Check formatting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: 'true'
      - name: Enable corepack
        run: sudo corepack enable
      - name: Install dependencies
        run: yarn
      - name: Check formatting
        run: yarn checkformat
